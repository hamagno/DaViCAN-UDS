[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_key, colorize

; Compiler optimizations
build_flags = 
    -O2
    -Wall
    -Wextra

; Partition scheme para ESP32-S3
board_build.partitions = partitions.csv

; TWAI (CAN) pins
build_flags +=
    -DCAN_TX=6
    -DCAN_RX=7

; Memory settings
board_build.flash_size = 8MB
board_build.psram = opi
board_upload.speed = 460800

; Library dependencies
lib_deps =

; Documentation
# ESP32-S3 TWAI Documentation:
# https://docs.espressif.com/projects/esp-idf/en/stable/esp32s3/api-reference/peripherals/twai.html
